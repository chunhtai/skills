name: code_review
description: Review code changes for quality, correctness, security, and style issues.
parameters:
  - name: file_path
    type: string
    description: Path to the file to review.
    required: true
  - name: focus
    type: string
    description: Optional focus area for the review (e.g., security, performance, style).
    required: false
instructions: |
  Review the provided code file and identify:
  1. Bugs or logical errors
  2. Security vulnerabilities
  3. Performance issues
  4. Code style and readability concerns
  5. Missing error handling
  6. Opportunities for improvement

  Provide clear, actionable feedback with specific line references where applicable.
